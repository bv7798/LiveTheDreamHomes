<section>
  <!-- Your Contact Form Code Starts Here -->
  <div class="container">
    <h1>Contact Us!</h1>
    <form action="backend/process_form.php" method="post">

      <label for="name">Full Name</label>
      <input type="text" id="name" name="name" required />

      <label for="age">Age</label>
      <input type="number" id="age" name="age" min="18" max="120" required />

      <label for="Familial Status">Familial Status</label>
      <select id="Familial Status" name="Familial Status" required>
        <option value="">-- Please Select --</option>
        <option value="single">Single</option>
        <option value="married with kids">Married with kids</option>
        <option value="married without kids">Married without kids</option>
      </select>

      <label for="price-range">Price Range (USD)</label>
      <input type="text" id="price-range" name="price_range" placeholder="e.g. 250,000 - 400,000" required />

      <label for="county">Preferred County</label>
      <select id="county" name="county" required>
        <option value="">-- Select County --</option>
        <option value="Atlantic">Atlantic County</option>
        <option value="Cape_May">Cape May County</option>
        <option value="Ocean">Ocean County</option>
      </select>

      <label for="notes">Additional Details (optional)</label>
      <textarea id="notes" name="notes" rows="4" placeholder="Tell us about your ideal home, timeline, etc."></textarea>

      <button type="submit">Submit Information</button>
    </form>
  </div>
  <!-- Your Contact Form Code Ends Here -->
